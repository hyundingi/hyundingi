name: Stealth README Sync

on:
  push:
    branches:
      - draft # draft 브랜치에 푸시가 일어나면 발동

permissions:
  contents: write # 봇이 main 브랜치에 글을 쓸 수 있도록 권한 부여

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 브랜치 이력을 가져옴

      - name: Sync README to main
        run: |
          # 깃허브 공식 봇 계정으로 작성자 설정 (현지 님 피드에 안 뜨게 하는 핵심)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 메인 브랜치로 전환
          git checkout main
          
          # draft 브랜치에 있는 README.md 파일만 쏙 빼서 가져오기
          git checkout draft -- README.md
          
          # 변경 사항이 있으면 스테이징 및 커밋/푸시
          git add README.md
          if git diff --cached --quiet; then
            echo "변경 사항이 없습니다."
          else
            git commit -m "⚡ Profile README updated automatically"
            git push origin main
          fi
